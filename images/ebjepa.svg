<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="EB-JEPA">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003E74"/>
      <stop offset="1" stop-color="#002544"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2c074"/>
      <stop offset="1" stop-color="#b88a2e"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="600" height="400" rx="22" fill="url(#navy)"/>
  <rect x="0" y="388" width="600" height="12" fill="url(#gold)"/>

  <!-- JEPA motif: a 3x3 patch grid; faded patches are "masked",
       the gold patch is the predicted target embedding. -->
  <g transform="translate(237,46)">
    <g fill="#aecdf0">
      <rect x="0"  y="0"  width="34" height="34" rx="6" opacity="0.9"/>
      <rect x="46" y="0"  width="34" height="34" rx="6" opacity="0.35"/>
      <rect x="92" y="0"  width="34" height="34" rx="6" opacity="0.9"/>
      <rect x="0"  y="46" width="34" height="34" rx="6" opacity="0.35"/>
      <rect x="46" y="46" width="34" height="34" rx="6" opacity="0.9"/>
      <rect x="92" y="46" width="34" height="34" rx="6" opacity="0.35"/>
      <rect x="0"  y="92" width="34" height="34" rx="6" opacity="0.9"/>
      <rect x="46" y="92" width="34" height="34" rx="6" opacity="0.35"/>
    </g>
    <!-- predicted target patch -->
    <rect x="92" y="92" width="34" height="34" rx="6" fill="url(#gold)"/>
    <rect x="92" y="92" width="34" height="34" rx="6" fill="none" stroke="#e2c074" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="268" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" letter-spacing="1">
    <tspan fill="#e2c074">EB</tspan><tspan fill="#7fa8d8">&#8226;</tspan><tspan fill="#ffffff">JEPA</tspan>
  </text>

  <!-- Subtitle -->
  <text x="300" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" letter-spacing="2" fill="#aecdf0">ENERGY-BASED JOINT-EMBEDDING</text>
  <text x="300" y="338" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" letter-spacing="2" fill="#aecdf0">PREDICTIVE ARCHITECTURES</text>
</svg>
